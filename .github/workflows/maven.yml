name: Main branch Maven Build, test and Verify

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: maven-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
      NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
    steps:
    
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Show default environment variables
      run: |
        echo "The job_id is: $GITHUB_JOB"   # reference the default environment variables
        echo "The id of this action is: $GITHUB_ACTION"   # reference the default environment variables
        echo "The run id is: $GITHUB_RUN_ID"
        echo "The GitHub Actor's username is: $GITHUB_ACTOR"
        echo "GitHub SHA: $GITHUB_SHA"
        echo "github.ref_name: ${{ github.ref_name }}"
        echo "github.ref: ${{ github.ref }}"

    - name: Cache local Maven repository
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-        

    - name: Prepare badge paths
      shell: bash
      run: |
        echo "SAFE_REF_NAME=${GITHUB_REF_NAME//\//-}" >> "$GITHUB_ENV"
        mkdir -p badges

    - name: Show NVD API key availability
      shell: bash
      run: |
        if [ -n "${NVD_API_KEY:-}" ]; then
          echo "NVD_API_KEY is set"
        else
          echo "NVD_API_KEY is missing"
        fi

    - name: Build with Maven (PR)
      if: github.event_name == 'pull_request'
      run: mvn -e -B -Ddependency-check.skip=true verify --file pom.xml

    - name: Build with Maven
      if: github.event_name != 'pull_request'
      run: mvn -e -B verify --file pom.xml

    # Optional: Uploads the full dependency graph to GitHub to improve the quality of Dependabot alerts this repository can receive
    - name: Update dependency graph
      uses: advanced-security/maven-dependency-submission-action@v4

    - name: Generate JaCoCo Badge
      uses: cicirello/jacoco-badge-generator@v2
      with:
        generate-branches-badge: true
        jacoco-csv-file: ./engine/target/site/jacoco/jacoco.csv
        badges-directory: ./badges
        coverage-badge-filename: jacoco-badge-${{ env.SAFE_REF_NAME }}.svg
    
    - name: Publish Test Results
      uses: EnricoMi/publish-unit-test-result-action@v2
      id: test-results
      if: always()
      with:
        files: |
          **/target/surefire-reports/TEST-*.xml
          **/target/failsafe-reports/TEST-*.xml

    - name: Set badge color
      shell: bash
      run: |
        case ${{ fromJSON( steps.test-results.outputs.json ).conclusion }} in
          success)
            echo "BADGE_COLOR=31c653" >> $GITHUB_ENV
            ;;
          failure)
            echo "BADGE_COLOR=800000" >> $GITHUB_ENV
            ;;
          neutral)
            echo "BADGE_COLOR=696969" >> $GITHUB_ENV
            ;;
        esac
    
    - name: Create badge
      uses: emibcn/badge-action@808173dd03e2f30c980d03ee49e181626088eee8
      with:
        label: Tests
        status: '${{ fromJSON( steps.test-results.outputs.json ).formatted.stats.tests }} tests, ${{ fromJSON( steps.test-results.outputs.json ).formatted.stats.runs }} runs: ${{ fromJSON( steps.test-results.outputs.json ).conclusion }}'
        color: ${{ env.BADGE_COLOR }}
        path: badge-${{ env.SAFE_REF_NAME }}.svg
    
    - name: OWASP vulnerabilities - count
      id: vuln
      run: |
        VULN_COUNT=$(jq '[.dependencies[] | select(.vulnerabilities and (.vulnerabilities | length > 0)) | .vulnerabilities[]] | length' engine/target/dependency-check-report.json)
        echo "OWASP Vulnerabilities count: $VULN_COUNT"
        echo "VULN_COUNT=$VULN_COUNT" >> $GITHUB_ENV

    - name: OWASP vulnerabilities - Generate badge
      uses: emibcn/badge-action@808173dd03e2f30c980d03ee49e181626088eee8
      with:
        label: 'OWASP Vulnerabilities'
        status: ${{ env.VULN_COUNT }}
        color: 31c653
        path: badge-owasp-${{ env.SAFE_REF_NAME }}.svg

    - name: Upload badges to Gist
      if: ${{ env.GIST_TOKEN != '' }}
      env:
        GIST_ID: a613341fb9d9d0c6a426b42a714700b7
        JACOCO_BADGE: ./badges/jacoco-badge-${{ env.SAFE_REF_NAME }}.svg
        TEST_BADGE: badge-${{ env.SAFE_REF_NAME }}.svg
        OWASP_BADGE: badge-owasp-${{ env.SAFE_REF_NAME }}.svg
      shell: bash
      run: |
        set -euo pipefail

        payload_file="$(mktemp)"
        response_file="$(mktemp)"

        jq -n \
          --arg jacocoName "$(basename "$JACOCO_BADGE")" \
          --rawfile jacocoContent "$JACOCO_BADGE" \
          --arg testName "$(basename "$TEST_BADGE")" \
          --rawfile testContent "$TEST_BADGE" \
          --arg owaspName "$(basename "$OWASP_BADGE")" \
          --rawfile owaspContent "$OWASP_BADGE" \
          '{
            files: {
              ($jacocoName): {filename: $jacocoName, content: $jacocoContent},
              ($testName): {filename: $testName, content: $testContent},
              ($owaspName): {filename: $owaspName, content: $owaspContent}
            }
          }' > "$payload_file"

        for attempt in 1 2 3 4 5; do
          status_code="$(curl --silent --show-error --output "$response_file" --write-out "%{http_code}" \
            --request PATCH \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: token ${GIST_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data @"$payload_file" \
            "https://api.github.com/gists/${GIST_ID}")"

          if [ "$status_code" = "200" ]; then
            echo "Gist badges updated successfully."
            exit 0
          fi

          if [ "$status_code" = "409" ] && [ "$attempt" -lt 5 ]; then
            sleep_seconds=$((attempt * 2))
            echo "Gist update conflict (HTTP 409). Retrying in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
            continue
          fi

          echo "Failed to update gist. HTTP status: ${status_code}"
          cat "$response_file"
          exit 1
        done

  wal-tools-smoke:
    name: WAL Tools Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Cache local Maven repository
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    - name: Build WAL tools distribution
      run: mvn -B -pl wal-tools -am -DskipTests package --file pom.xml

    - name: Smoke test WAL tools scripts
      shell: bash
      run: |
        set -euo pipefail

        WAL_TOOLS_ZIP="$(ls wal-tools/target/wal-tools-*.zip | head -n1)"
        TMP_DIR="$(mktemp -d)"
        trap 'rm -rf "${TMP_DIR}"' EXIT

        unzip -q "${WAL_TOOLS_ZIP}" -d "${TMP_DIR}"
        DIST_DIR="$(find "${TMP_DIR}" -maxdepth 1 -mindepth 1 -type d -name 'wal-tools-*' | head -n1)"

        set +e
        "${DIST_DIR}/bin/wal_verify" >"${TMP_DIR}/verify-no-args.out" 2>&1
        VERIFY_NO_ARGS_EXIT=$?
        "${DIST_DIR}/bin/wal_dump" >"${TMP_DIR}/dump-no-args.out" 2>&1
        DUMP_NO_ARGS_EXIT=$?
        "${DIST_DIR}/bin/wal_verify" /tmp/hestia-missing-wal >"${TMP_DIR}/verify-missing-dir.out" 2>&1
        VERIFY_MISSING_DIR_EXIT=$?
        set -e

        test "${VERIFY_NO_ARGS_EXIT}" -eq 1
        test "${DUMP_NO_ARGS_EXIT}" -eq 1
        test "${VERIFY_MISSING_DIR_EXIT}" -eq 1

        grep -q "Usage: wal_verify" "${TMP_DIR}/verify-no-args.out"
        grep -q "Usage: wal_dump" "${TMP_DIR}/dump-no-args.out"
        grep -q "WAL directory does not exist" "${TMP_DIR}/verify-missing-dir.out"
            
