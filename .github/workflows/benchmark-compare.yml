name: Benchmark Compare

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      profile:
        description: Benchmark profile name under benchmarks/profiles
        required: false
        default: segment-index-pr-smoke
        type: string
      history_branch:
        description: Branch used for long-lived benchmark history
        required: false
        default: perf-artifacts
        type: string
      history_channel:
        description: Optional history channel name for latest pointers
        required: false
        default: main
        type: string
      history_pr_number:
        description: Optional PR number for PR-scoped history publishing
        required: false
        default: ""
        type: string
      baseline_ref:
        description: Optional git baseline when no stored history baseline is available
        required: false
        default: ""
        type: string
      candidate_ref:
        description: Optional candidate git ref or SHA
        required: false
        default: ""
        type: string
      fail_on_regression:
        description: Fail the job when severe regressions are detected
        required: false
        default: false
        type: boolean
      publish_history:
        description: Publish candidate run into the history branch
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: benchmark-compare-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compare:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Validate benchmark profile contracts
      shell: bash
      run: |
        set -euo pipefail
        mvn -q -pl benchmarks -am -DskipTests=false \
          -Dtest=BenchmarkProfileContractTest \
          -Dsurefire.failIfNoSpecifiedTests=false test

    - name: Resolve benchmark refs
      id: refs
      shell: bash
      run: |
        set -euo pipefail

        PROFILE="segment-index-pr-smoke"
        FAIL_ON_REGRESSION="false"
        HISTORY_BRANCH="perf-artifacts"
        HISTORY_CHANNEL="main"
        PR_NUMBER=""
        PUBLISH_HISTORY="false"
        FALLBACK_BASELINE_REF=""

        if [ "${{ github.event_name }}" = "schedule" ]; then
          PROFILE="segment-index-nightly"
          CANDIDATE_REF="${GITHUB_SHA}"
          FALLBACK_BASELINE_REF="$(git rev-parse "${GITHUB_SHA}~1")"
          PUBLISH_HISTORY="true"
        elif [ "${{ github.event_name }}" = "pull_request" ]; then
          CANDIDATE_REF="${{ github.event.pull_request.head.sha }}"
          BASE_BRANCH="origin/${{ github.event.pull_request.base.ref }}"
          HISTORY_CHANNEL="pr-${{ github.event.pull_request.number }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          if [ "${{ github.event.pull_request.head.repo.full_name }}" = "${{ github.repository }}" ]; then
            PUBLISH_HISTORY="true"
          fi
          git fetch --no-tags origin "${{ github.event.pull_request.base.ref }}" "${CANDIDATE_REF}"
          FALLBACK_BASELINE_REF="$(git merge-base "${CANDIDATE_REF}" "${BASE_BRANCH}")"
        else
          PROFILE="${{ inputs.profile }}"
          FAIL_ON_REGRESSION="${{ inputs.fail_on_regression }}"
          HISTORY_BRANCH="${{ inputs.history_branch }}"
          HISTORY_CHANNEL="${{ inputs.history_channel }}"
          PR_NUMBER="${{ inputs.history_pr_number }}"
          PUBLISH_HISTORY="${{ inputs.publish_history }}"
          CANDIDATE_REF="${{ inputs.candidate_ref }}"
          FALLBACK_BASELINE_REF="${{ inputs.baseline_ref }}"
          if [ -z "${CANDIDATE_REF}" ]; then
            CANDIDATE_REF="${GITHUB_SHA}"
          fi
          if [ -z "${FALLBACK_BASELINE_REF}" ]; then
            FALLBACK_BASELINE_REF="origin/main"
          fi
          git fetch --no-tags origin main "${CANDIDATE_REF}" || true
        fi
        if [ -n "${PR_NUMBER}" ] && [ "${HISTORY_CHANNEL}" = "main" ]; then
          HISTORY_CHANNEL="pr-${PR_NUMBER}"
        fi

        CANDIDATE_REF="$(git rev-parse "${CANDIDATE_REF}")"
        FALLBACK_BASELINE_REF="$(git rev-parse "${FALLBACK_BASELINE_REF}")"

        echo "profile=${PROFILE}" >> "${GITHUB_OUTPUT}"
        echo "fallback_baseline_ref=${FALLBACK_BASELINE_REF}" >> "${GITHUB_OUTPUT}"
        echo "candidate_ref=${CANDIDATE_REF}" >> "${GITHUB_OUTPUT}"
        echo "fail_on_regression=${FAIL_ON_REGRESSION}" >> "${GITHUB_OUTPUT}"
        echo "history_branch=${HISTORY_BRANCH}" >> "${GITHUB_OUTPUT}"
        echo "history_channel=${HISTORY_CHANNEL}" >> "${GITHUB_OUTPUT}"
        echo "pr_number=${PR_NUMBER}" >> "${GITHUB_OUTPUT}"
        echo "publish_history=${PUBLISH_HISTORY}" >> "${GITHUB_OUTPUT}"

    - name: Detect fallback baseline compatibility
      id: fallback-compat
      if: steps.stored-baseline.outputs.baseline_summary == ''
      shell: bash
      run: |
        set -euo pipefail

        PROFILE_PATH="benchmarks/profiles/${{ steps.refs.outputs.profile }}.json"
        CAN_RUN="true"

        if ! git cat-file -e "${{ steps.refs.outputs.fallback_baseline_ref }}:${PROFILE_PATH}" 2>/dev/null; then
          CAN_RUN="false"
        fi
        if [ "${CAN_RUN}" = "true" ]; then
          while IFS= read -r BENCHMARK_CLASS_PATH; do
            if ! git cat-file -e "${{ steps.refs.outputs.fallback_baseline_ref }}:${BENCHMARK_CLASS_PATH}" 2>/dev/null; then
              CAN_RUN="false"
              break
            fi
          done < <(python3 - <<'PY'
        import json
        from pathlib import Path

        profile_path = Path("benchmarks/profiles/${{ steps.refs.outputs.profile }}.json")
        profile = json.loads(profile_path.read_text(encoding="utf-8"))
        paths = []
        for benchmark in profile.get("benchmarks", []):
            include = benchmark.get("include")
            if not include:
                continue
            relative = "benchmarks/src/main/java/" + include.replace(".", "/") + ".java"
            paths.append(relative)
        for path in sorted(set(paths)):
            print(path)
        PY
          )
        fi

        echo "can_run=${CAN_RUN}" >> "${GITHUB_OUTPUT}"

    - name: Prepare history checkout
      id: history
      shell: bash
      run: |
        set -euo pipefail

        HISTORY_DIR="${RUNNER_TEMP}/perf-artifacts"
        rm -rf "${HISTORY_DIR}"
        git clone "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" "${HISTORY_DIR}"
        cd "${HISTORY_DIR}"
        if git ls-remote --exit-code --heads origin "${{ steps.refs.outputs.history_branch }}" >/dev/null 2>&1; then
          git fetch origin "${{ steps.refs.outputs.history_branch }}"
          git checkout -B "${{ steps.refs.outputs.history_branch }}" "origin/${{ steps.refs.outputs.history_branch }}"
          echo "history_exists=true" >> "${GITHUB_OUTPUT}"
        else
          git checkout --orphan "${{ steps.refs.outputs.history_branch }}"
          git rm -rf . >/dev/null 2>&1 || true
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          mkdir -p history
          echo "history_exists=false" >> "${GITHUB_OUTPUT}"
        fi
        echo "history_dir=${HISTORY_DIR}" >> "${GITHUB_OUTPUT}"

    - name: Resolve stored baseline
      id: stored-baseline
      shell: bash
      run: |
        set -euo pipefail

        BASELINE_SUMMARY=""
        if python3 benchmarks/scripts/resolve_jmh_history_baseline.py \
          --history-dir "${{ steps.history.outputs.history_dir }}" \
          --profile "${{ steps.refs.outputs.profile }}" \
          --channel main > "${RUNNER_TEMP}/baseline-summary-path.txt"; then
          BASELINE_SUMMARY="$(cat "${RUNNER_TEMP}/baseline-summary-path.txt")"
        fi

        echo "baseline_summary=${BASELINE_SUMMARY}" >> "${GITHUB_OUTPUT}"

    - name: Create candidate worktree
      id: candidate-worktree
      shell: bash
      run: |
        set -euo pipefail

        CANDIDATE_DIR="${RUNNER_TEMP}/benchmark-candidate"
        rm -rf "${CANDIDATE_DIR}"
        git worktree add --detach "${CANDIDATE_DIR}" "${{ steps.refs.outputs.candidate_ref }}"
        echo "candidate_dir=${CANDIDATE_DIR}" >> "${GITHUB_OUTPUT}"

    - name: Create fallback baseline worktree
      if: steps.stored-baseline.outputs.baseline_summary == '' && steps.fallback-compat.outputs.can_run == 'true'
      id: baseline-worktree
      shell: bash
      run: |
        set -euo pipefail

        BASE_DIR="${RUNNER_TEMP}/benchmark-baseline"
        rm -rf "${BASE_DIR}"
        git worktree add --detach "${BASE_DIR}" "${{ steps.refs.outputs.fallback_baseline_ref }}"
        echo "baseline_dir=${BASE_DIR}" >> "${GITHUB_OUTPUT}"

    - name: Run fallback baseline benchmark profile
      if: steps.stored-baseline.outputs.baseline_summary == '' && steps.fallback-compat.outputs.can_run == 'true'
      shell: bash
      run: |
        set -euo pipefail
        python3 benchmarks/scripts/run_jmh_profile.py \
          --repo-root "${{ steps.baseline-worktree.outputs.baseline_dir }}" \
          --profile "${GITHUB_WORKSPACE}/benchmarks/profiles/${{ steps.refs.outputs.profile }}.json" \
          --output-dir "${RUNNER_TEMP}/benchmark-results/baseline"

    - name: Run candidate benchmark profile
      shell: bash
      run: |
        set -euo pipefail
        python3 benchmarks/scripts/run_jmh_profile.py \
          --repo-root "${{ steps.candidate-worktree.outputs.candidate_dir }}" \
          --profile "${GITHUB_WORKSPACE}/benchmarks/profiles/${{ steps.refs.outputs.profile }}.json" \
          --output-dir "${RUNNER_TEMP}/benchmark-results/candidate"

    - name: Compare baseline and candidate
      shell: bash
      run: |
        set -euo pipefail

        EXTRA_ARGS=()
        if [ "${{ steps.refs.outputs.fail_on_regression }}" = "true" ]; then
          EXTRA_ARGS+=(--fail-on-regression)
        fi

        BASELINE_SUMMARY="${{ steps.stored-baseline.outputs.baseline_summary }}"
        if [ -z "${BASELINE_SUMMARY}" ]; then
          if [ "${{ steps.fallback-compat.outputs.can_run }}" = "true" ]; then
            BASELINE_SUMMARY="${RUNNER_TEMP}/benchmark-results/baseline/summary.json"
          else
            BASELINE_SUMMARY="${RUNNER_TEMP}/benchmark-results/candidate/summary.json"
          fi
        fi

        python3 benchmarks/scripts/compare_jmh_profile.py \
          --baseline "${BASELINE_SUMMARY}" \
          --candidate "${RUNNER_TEMP}/benchmark-results/candidate/summary.json" \
          --markdown-out "${RUNNER_TEMP}/benchmark-results/comparison.md" \
          --json-out "${RUNNER_TEMP}/benchmark-results/comparison.json" \
          "${EXTRA_ARGS[@]}"

        if [ "${{ steps.stored-baseline.outputs.baseline_summary }}" = "" ] && [ "${{ steps.fallback-compat.outputs.can_run }}" != "true" ]; then
          TMP_FILE="${RUNNER_TEMP}/benchmark-results/comparison.bootstrap.md"
          {
            echo "# Benchmark Comparison"
            echo
            echo "- Bootstrap mode: no prior canonical baseline exists yet, and fallback git baseline predates the benchmark harness."
            echo "- Candidate results below are the first canonical benchmark snapshot for this workflow."
            echo
            tail -n +2 "${RUNNER_TEMP}/benchmark-results/comparison.md"
          } > "${TMP_FILE}"
          mv "${TMP_FILE}" "${RUNNER_TEMP}/benchmark-results/comparison.md"
        fi

    - name: Add job summary
      shell: bash
      run: |
        cat "${RUNNER_TEMP}/benchmark-results/comparison.md" >> "${GITHUB_STEP_SUMMARY}"

    - name: Upload benchmark comparison artifacts
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-compare-${{ steps.refs.outputs.profile }}-${{ github.run_id }}
        path: |
          ${{ runner.temp }}/benchmark-results

    - name: Publish candidate run to perf-artifacts history
      if: steps.refs.outputs.publish_history == 'true'
      id: publish-history
      shell: bash
      run: |
        set -euo pipefail

        METADATA_PATH="${RUNNER_TEMP}/benchmark-results/publish-history.json"
        PUBLISH_ARGS=(
          --source-dir "${RUNNER_TEMP}/benchmark-results/candidate"
          --history-dir "${{ steps.history.outputs.history_dir }}"
          --channel "${{ steps.refs.outputs.history_channel }}"
          --run-suffix "${GITHUB_RUN_ID}"
          --comparison-markdown "${RUNNER_TEMP}/benchmark-results/comparison.md"
          --comparison-json "${RUNNER_TEMP}/benchmark-results/comparison.json"
          --metadata-out "${METADATA_PATH}"
        )
        if [ -n "${{ steps.refs.outputs.pr_number }}" ]; then
          PUBLISH_ARGS+=(--pr-number "${{ steps.refs.outputs.pr_number }}")
        fi

        python3 benchmarks/scripts/publish_jmh_history.py \
          "${PUBLISH_ARGS[@]}"

        export METADATA_PATH
        python3 - <<'PY' >> "${GITHUB_OUTPUT}"
        import json
        import os
        import pathlib

        metadata_path = pathlib.Path(os.environ["METADATA_PATH"])
        metadata = json.loads(metadata_path.read_text(encoding="utf-8"))
        for key in ("latestPointerPath", "runPath", "summaryPath",
                    "comparisonMarkdownPath", "comparisonJsonPath"):
            value = metadata.get(key)
            if value:
                print(f"{key}={value}")
        pr_number = metadata.get("prNumber")
        if pr_number:
            print(f"publishedPrNumber={pr_number}")
        PY

        cd "${{ steps.history.outputs.history_dir }}"
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add history
        if git diff --cached --quiet; then
          echo "No perf history changes to publish."
          exit 0
        fi
        git commit -m "perf: publish ${{ steps.refs.outputs.profile }} ${{ steps.refs.outputs.history_channel }} for ${{ steps.refs.outputs.candidate_ref }}"
        git push origin "HEAD:${{ steps.refs.outputs.history_branch }}"

    - name: Prepare PR benchmark comment
      if: github.event_name == 'pull_request'
      id: prepare-pr-comment
      shell: bash
      run: |
        set -euo pipefail

        COMMENT_PATH="${RUNNER_TEMP}/benchmark-results/pr-comment.md"
        RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        HISTORY_BASE_URL="${{ github.server_url }}/${{ github.repository }}"
        ARTIFACT_NAME="benchmark-compare-${{ steps.refs.outputs.profile }}-${{ github.run_id }}"
        BASELINE_POINTER_URL="${HISTORY_BASE_URL}/blob/${{ steps.refs.outputs.history_branch }}/history/${{ steps.refs.outputs.profile }}/latest-main.json"

        {
          echo "<!-- benchmark-compare:${{ steps.refs.outputs.profile }} -->"
          echo "## Benchmark Compare: \`${{ steps.refs.outputs.profile }}\`"
          echo
          echo "- Run: [${{ github.run_id }}](${RUN_URL})"
          echo "- Artifact: \`${ARTIFACT_NAME}\`"
          if [ -n "${{ steps.publish-history.outputs.latestPointerPath }}" ]; then
            echo "- PR history pointer: [latest.json](${HISTORY_BASE_URL}/blob/${{ steps.refs.outputs.history_branch }}/${{ steps.publish-history.outputs.latestPointerPath }})"
            echo "- PR history run: [published snapshot](${HISTORY_BASE_URL}/tree/${{ steps.refs.outputs.history_branch }}/${{ steps.publish-history.outputs.runPath }})"
          fi
          if [ -n "${{ steps.stored-baseline.outputs.baseline_summary }}" ]; then
            echo "- Baseline source: [canonical latest-main.json](${BASELINE_POINTER_URL})"
          elif [ "${{ steps.fallback-compat.outputs.can_run }}" = "true" ]; then
            echo "- Baseline source: fallback git baseline \`${{ steps.refs.outputs.fallback_baseline_ref }}\`"
          else
            echo "- Baseline source: bootstrap mode without prior canonical baseline"
          fi
          echo
          echo "<details><summary>Comparison details</summary>"
          echo
          cat "${RUNNER_TEMP}/benchmark-results/comparison.md"
          echo
          echo "</details>"
        } > "${COMMENT_PATH}"

        echo "comment_path=${COMMENT_PATH}" >> "${GITHUB_OUTPUT}"

    - name: Upsert PR benchmark comment
      if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
      uses: actions/github-script@v7
      env:
        COMMENT_PATH: ${{ steps.prepare-pr-comment.outputs.comment_path }}
      with:
        github-token: ${{ github.token }}
        script: |
          const fs = require("fs");
          const body = fs.readFileSync(process.env.COMMENT_PATH, "utf8");
          const marker = "<!-- benchmark-compare:${{ steps.refs.outputs.profile }} -->";
          const { owner, repo } = context.repo;
          const issue_number = context.issue.number;
          const comments = await github.paginate(github.rest.issues.listComments, {
            owner,
            repo,
            issue_number,
            per_page: 100,
          });
          const existing = comments.find((comment) =>
            comment.user?.type === "Bot"
            && typeof comment.body === "string"
            && comment.body.includes(marker)
          );
          if (existing) {
            await github.rest.issues.updateComment({
              owner,
              repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            });
          }

    - name: Remove temporary worktrees
      if: always()
      shell: bash
      run: |
        set -euo pipefail
        git worktree remove --force "${{ steps.baseline-worktree.outputs.baseline_dir }}" || true
        git worktree remove --force "${{ steps.candidate-worktree.outputs.candidate_dir }}" || true
